name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Foss Debug APK
        run: ./gradlew assembleFossDebug --stacktrace

      - name: List APKs
        run: find app/build -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Messages-APK
          path: app/build/outputs/apk/**/*.apk
